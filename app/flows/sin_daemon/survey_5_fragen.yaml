name: survey_5_fragen
version: 1746400000
description: |
  Survey Flow mit vollständiger 5-Fragen-Integration.
  Jeder Step: Guardian-Check → Intent-Start → Action → Verify → Record → Guardian-Check.
  Kein Workaround kann ohne Dokumentation durchgeschlüpft werden.

promotion_tier: candidate
required_successes: 10

steps:
  - id: gatekeeper_pre
    tool: guardian_request_action
    description: Prüfe ob letzter Zyklus vollständig (Frage 5)
    on_blocked:
      wait: guardian_wait_for_clearance
      timeout: 300
      fallback: abort

  - id: intent_start
    tool: memory_start_intent
    params:
      goal: "Anmelden bei heypiggy.com über Google OAuth"
      context:
        tool: heypiggy_login
        step: 1
        phase: authentication
    description: Speichere Ziel vor Login-Aktion (Frage 1)

  - id: action_login
    tool: heypiggy_login
    params:
      pid: "{payload.pid}"
      cdp_port: "{payload.cdp_port}"
    description: Führe heypiggy Login durch
    verify_box: true

  - id: intent_verify_login
    tool: memory_verify_and_record
    params:
      exit_code: 0
      stdout: "{action_login.stdout}"
      stderr: "{action_login.stderr}"
      workaround: "{action_login.workaround_used}"
    description: Prüfe Login-Ergebnis (Frage 2-3)

  - id: record_login
    tool: memory_record
    description: Dokumentiere Soll-Ist-Vergleich (Frage 4)

  - id: gatekeeper_post_login
    tool: guardian_request_action
    description: Freigabe für nächsten Step (Frage 5)

  # Survey Start
  - id: intent_survey_start
    tool: memory_start_intent
    params:
      goal: "Survey starten über Dashboard"
      context:
        tool: cua-driver
        step: 2
        phase: survey
    description: Intent für Survey-Start

  - id: action_scan_surveys
    tool: sync_poll_events
    description: Scanne opencode.db auf laufende Surveys
    verify_box: false

  - id: intent_verify_scan
    tool: memory_verify_and_record
    params:
      exit_code: 0
      stdout: "{action_scan_surveys.stdout}"
      stderr: ""
      workaround: false
    description: Verifiziere Scan-Ergebnis

  - id: record_scan
    tool: memory_record
    description: Dokumentiere Scan

  - id: gatekeeper_post_scan
    tool: guardian_request_action
    description: Freigabe für Survey-Klick

  # Survey Consent
  - id: intent_consent
    tool: memory_start_intent
    params:
      goal: "Consent Button klicken: Zustimmen und fortfahren"
      context:
        tool: cua-driver
        step: 3
        phase: consent
    description: Intent für Consent

  - id: action_consent
    tool: survey_heypiggy_cua_only
    params:
      pid: "{payload.pid}"
      phase: consent
    description: Klicke Consent Button
    verify_box: true

  - id: intent_verify_consent
    tool: memory_verify_and_record
    params:
      exit_code: 0
      stdout: "{action_consent.stdout}"
      stderr: "{action_consent.stderr}"
      workaround: "{action_consent.workaround_used}"
    description: Verifiziere Consent

  - id: record_consent
    tool: memory_record
    description: Dokumentiere Consent

  - id: gatekeeper_post_consent
    tool: guardian_request_action
    description: Freigabe für Survey-Fragen

  # Audio Question (BlackHole)
  - id: intent_audio
    tool: memory_start_intent
    params:
      goal: "Audio-Frage beantworten (Tiergeräusch erkennen)"
      context:
        tool: audio_capture
        step: 4
        phase: question
    description: Intent für Audio-Frage

  - id: action_audio
    tool: audio_capture
    params:
      duration: 6
      analyze: true
    description: Aufnehmen + NVIDIA Omni Analyse
    verify_box: false

  - id: intent_verify_audio
    tool: memory_verify_and_record
    params:
      exit_code: 0
      stdout: "{action_audio.stdout}"
      stderr: ""
      workaround: "{action_audio.workaround_used}"
    description: Verifiziere Audio-Ergebnis

  - id: record_audio
    tool: memory_record
    description: Dokumentiere Audio-Frage

  - id: gatekeeper_final
    tool: guardian_request_action
    description: Finale Freigabe

error_handling:
  on_workaround:
    - tool: memory_verify_and_record
      params:
        exit_code: 0
        stdout: "workaround_used=true"
        stderr: ""
        workaround: true
    - tool: memory_record
    - gatekeeper blocks until brain.md updated

  on_failure:
    - tool: memory_verify_and_record
      params:
        exit_code: 1
        stdout: ""
        stderr: "{step.stderr}"
        workaround: false
    - tool: memory_record
    - guardian blocks until learn.md updated
    - abort_after_timeout: 300

metadata:
  source: SIN-daemon 5-Fragen-Pipeline
  created: "2026-05-04"
  tools_registered:
    - guardian_request_action
    - guardian_wait_for_clearance
    - memory_start_intent
    - memory_verify_and_record
    - memory_record
    - sync_poll_events
  integration_prs:
    - stealth-memory: "#1"
    - stealth-sync: "#9"
    - stealth-guardian: "#2"
    - stealth-runner: "#22"