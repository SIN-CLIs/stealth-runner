# Pre-Commit Configuration (SR-73, 2026-05-11)
# Hooks enforce AGENTS.md Brain-Rules before commits

repos:
  # Submodule Validation (SR-73 §11.9)
  - repo: local
    hooks:
      - id: check-submodules
        name: "Check Submodules Config (SR-73)"
        entry: python scripts/check_submodules.py
        language: system
        pass_filenames: false
        stages: [commit]
        always_run: true

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  # Python code quality
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3

  # Lint Python
  - repo: https://github.com/PyCQA/pylint
    rev: pylint-3.0.3
    hooks:
      - id: pylint
        args: ['--max-line-length=120', '--disable=missing-docstring']
