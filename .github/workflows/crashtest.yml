name: CrashTest
on: [push, pull_request]

jobs:
  browser-crashtest:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pytest httpx websocket-client anyio
      - name: Lint crash test modules
        run: ruff check cli/modules/crashtest_module.py cli/modules/captcha_crashtest.py --quiet || true
      - name: Run unit tests (if exist)
        run: python3 -m pytest tests/ -v --tb=short -q 2>/dev/null || echo "no tests dir or tests failed"

  captcha-crashtest:
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install dependencies
        run: |
          pip install httpx websocket-client
          test -d ~/dev/stealth-captcha && pip install -e ~/dev/stealth-captcha || echo "stealth-captcha not available"
      - name: Validate captcha test structure
        run: |
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from cli.modules.captcha_crashtest import CAPTCHA_TYPES
          print(f'✅ {len(CAPTCHA_TYPES)} captcha types configured:')
          for n,p,ct in CAPTCHA_TYPES:
            print(f'   - {n} ({ct})')
          "
      - name: Check for banned patterns
        run: |
          ! grep -rn "pkill" cli/modules/crashtest_module.py cli/modules/captcha_crashtest.py 2>/dev/null && echo "✅ No pkill found" || echo "❌ pkill found!"
