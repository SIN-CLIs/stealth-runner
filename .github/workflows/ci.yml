name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pytest pytest-asyncio pytest-cov ruff mypy httpx anyio
      - run: ruff check .
      - run: mypy runner/ sin_survey_core/ --ignore-missing-imports
      - run: pytest tests/ --cov --cov-report=xml -q
      - run: pip-audit || true
