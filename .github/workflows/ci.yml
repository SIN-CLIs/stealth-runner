# CI WORKFLOW — TRIGGER-MATRIX
#
# Diese Datei ist Teil des Agenten-Brains. Aenderungen an `on:` muessen
# in AGENTS.md §13.8 (CI-Notiz) reflektiert werden, sonst laeuft eine
# PR ohne gruenes CI durch.
#
# Geschichte:
# - Initial: nur main/master (PRs gegen Integrationsbranches wie
#   `feat/universal-cdp-scanner` liefen ohne CI durch -> SR-50..SR-55
#   waren in PR #54 zwischenzeitlich ohne CI-Gate mergewuerdig).
# - 2026-05-11 (SR-50..SR-59 Followup, dieser Commit): Erweitert auf
#   `feat/**` und `fix/**` Push-Branches; `pull_request` ohne
#   Branch-Filter, damit JEDE PR (auch gegen Integrationsbranches) ein
#   gruenes Gate braucht.
name: CI

on:
  push:
    branches:
      - main
      - master
      - "feat/**"
      - "fix/**"
  # WICHTIG: KEIN `branches:`-Filter. Sonst skippt CI auf PRs gegen
  # Integrationsbranches (`feat/universal-cdp-scanner` etc.) und es
  # entstehen Merges ohne Gate (vgl. PR #54 / SR-50..SR-55).
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      # AGENTS.md §13.8.4: Action-Versionen sind Brain-Eigentum, kein @latest.
      # SR-65 (2026-05-11): Bump auf Node-24-Runtime vor 2026-06-02-Frist.
      # checkout@v4 -> @v5, setup-python@v5 -> @v6. Folge-Bumps hier nachziehen
      # und in §13.8.4 als Zeile + Datum verankern (Audit-Trail).
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # SR-62: `|| true` removed — silent failures of dep install
          # hide downstream ImportErrors in tests (cf. PR #54 history).
          pip install -r survey-cli/requirements.txt
          pip install pytest ruff mypy pre-commit

      - name: Run banned patterns check
        run: python scripts/check_banned_patterns.py

      # Regression-Gate fuer SR-60: prueft, dass `check_banned_patterns.py`
      # weder Doku-Docstrings noch eigene Selbst-Referenzen als Treffer
      # meldet. Wenn dieser Step rot wird, ist die Tokenize-basierte
      # Mask-Logik kaputt (siehe AGENTS.md §13.8.1 SR-60).
      - name: Run banned-patterns self-tests (SR-60)
        run: python -m unittest scripts.tests.test_check_banned_patterns -v

      # SR-62: deliberate scope. `--select E,W,F` enforces REAL-BUG
      # rules (F-class = real bugs, E4/E7/E9 = syntax/semantics).
      # `--ignore E501,E701,E702` excludes purely cosmetic line-
      # formatting rules that are tracked as legacy-debt under
      # SR-62 (#61). DO NOT widen the ignore-list without opening a
      # debt-tracker issue first; AGENTS.md §13.8.1 documents the
      # contract.
      - name: Run ruff check
        run: ruff check survey-cli/survey --select E,W,F

      # SR-190 (Issue #189) — mypy in CI, Phase 1: INFORMATIONAL ONLY.
      # ----------------------------------------------------------------
      # Doctrine (full rationale lives at the tail of survey-cli/AGENTS.md
      # under "SR-190 - mypy in CI"). Short form here for the next agent:
      # - Scope: survey-cli/survey/ (Production-Code). Tests OUT-OF-SCOPE.
      # - Config: survey-cli/pyproject.toml has [tool.mypy] strict = true.
      #   We respect that config; no CLI overrides here.
      # - Matrix-Pin: ONLY runs on Python 3.13 (avoids double-counts in CI
      #   logs and matches Issue #189's Python-3.13-as-baseline requirement).
      # - Non-blocking: `|| true` forces exit 0. GitHub Actions runs each
      #   `run:` block with `bash -e -o pipefail`, so `; true` would NOT
      #   swallow mypy's non-zero exit — `set -e` aborts after `;`. You
      #   MUST use `|| true` here.
      # - --no-error-summary keeps raw `error:` lines grep-able from logs
      #   (count via `grep -c "error:"`). Baseline at first run was 1075.
      # - Promotion to Phase 2 (blocking): when count drops below 50, drop
      #   the `|| true` and the `--no-error-summary`, then update the
      #   AGENTS.md SR-190 block to "Phase 2 ACTIVE".
      # - DO NOT add `--ignore-missing-imports` here. DO NOT inline
      #   per-module overrides — those belong in pyproject.toml and need
      #   a separate debt issue (precedent: SR-62/SR-63 for ruff/pytest).
      - name: Type-check with mypy (SR-190 — informational phase)
        if: matrix.python-version == '3.13'
        run: cd survey-cli && mypy survey/ --no-error-summary 2>&1 || true

      - name: Run survey-cli tests
        env:
          PYTHONPATH: survey-cli
        # SR-63 (#62) RESOLVED: previously 10 test files were --ignore'd
        # in CI to hide 37 pre-existing failures. They are now collected
        # but marked `pytest.mark.skip` at module level with documented
        # reasons (see header of each file). This makes the debt visible
        # in CI output ("skipped") instead of silently dropped. To
        # re-enable a file, remove its `pytestmark = pytest.mark.skip(...)`
        # header. DO NOT re-add `--ignore` flags here without opening a
        # new debt-tracker issue first.
        run: pytest survey-cli/tests -q

      # SR-56 (FCTC-ES Phase 1): Eval-Harness für ProfileLoader.match_field
      # Threshold: 0.92 F1-Score. Bei Regression → roter CI.
      # Gold-Korpus: survey-cli/tests/fixtures/match_field_corpus.jsonl
      - name: Run match_field eval harness (SR-56)
        env:
          PYTHONPATH: survey-cli
        run: python survey-cli/tools/eval_match_field.py --threshold 0.92

      # SR-240 (CEO-WAVE-1): trajectory eval harness — gates the build
      # on the SCORE-CARD QUALITY of frozen golden trajectories. Uses a
      # deterministic mock backend (no NIM/LLM call), so this step is
      # safe on every PR including forks. The harness exits non-zero on
      # threshold miss; CI lifts that into a red build. See
      # docs/EVAL_HARNESS.md for the contract and how to update the
      # golden set.
      - name: Run trajectory eval harness (SR-240)
        env:
          PYTHONPATH: survey-cli
        run: |
          cd survey-cli
          python -m evals.trajectory.run_eval \
            --threshold 0.65 \
            --report evals/trajectory/last-report.json \
            --exit-non-zero-on-threshold-miss

      - name: Run pre-commit hooks
        run: pre-commit run --all-files || true
