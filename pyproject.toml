[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "stealth-runner"
version = "0.2.0"
description = "Orchestrator der Stealth-Triade v2.0"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "SIN-CLIs", email = "openssin@proton.me" }]
dependencies = ["anyio>=4.0", "httpx>=0.28", "pydantic>=2.0", "python-dotenv>=1.0", "structlog>=24.0", "tenacity>=8.0", "filelock>=3.0", "typer>=0.12", "rich>=13.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "pytest-cov>=6.0", "ruff>=0.9", "mypy>=1.14", "coverage>=7.0"]

[project.scripts]
stealth-runner = "runner.cli:main_cli"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-v", "--tb=short", "--cov=runner", "--cov=sin_survey_core", "--cov-report=term-missing"]

[tool.ruff]
target-version = "py312"
line-length = 100
[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "SIM", "UP"]
