[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "stealth-runner"
version = "0.2.0"
description = "Orchestrator der Stealth-Triade v2.0 – playstealth-cli, skylight-cli, unmask-cli"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "SIN-CLIs", email = "openssin@proton.me" }]
keywords = ["automation", "stealth", "survey", "macos", "skylight", "vision-llm", "anti-bot"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS :: MacOS X",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = ["anyio>=4.0", "httpx>=0.28"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "pytest-cov>=6.0", "ruff>=0.9", "mypy>=1.14", "coverage>=7.0", "hypothesis>=6.0"]
test = ["pytest>=8.0", "pytest-asyncio>=0.24", "pytest-cov>=6.0", "coverage>=7.0"]
lint = ["ruff>=0.9", "mypy>=1.14"]

[project.urls]
Homepage = "https://github.com/OpenSIN-AI/stealth-runner"
Repository = "https://github.com/OpenSIN-AI/stealth-runner"
Issues = "https://github.com/OpenSIN-AI/stealth-runner/issues"

[project.scripts]
stealth-runner = "runner.state_machine:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-v", "--tb=short", "--strict-markers", "--cov=runner", "--cov=sin_survey_core", "--cov-report=term-missing"]
markers = ["anyio: Asynchrone Tests", "slow: Integrationstests"]

[tool.coverage.run]
source = ["runner", "sin_survey_core"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
fail_under = 70

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "SIM", "UP"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
disallow_untyped_defs = true
exclude = ["tests/"]

[[tool.mypy.overrides]]
module = ["anyio", "httpx", "pytest", "hypothesis"]
ignore_missing_imports = true

[tool.setuptools.packages.find]
where = ["."]
include = ["runner*", "sin_survey_core*"]
